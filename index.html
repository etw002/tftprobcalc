<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Slider Page</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    label { width: 120px; }
    input[type="range"] { flex: 1; }
    .val { width: 60px; text-align: right; }
    .result { font-size: 2rem; font-weight: bold; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>TFT probability calculator</h1>

  <div class="row">
    <label>level</label>
    <input type="range" min="1" max="10" value="8" id="level">
    <span class="val" id="level">8</span>
  </div>

  <div class="row">
    <label>1-cost</label>
    <input type="range" min="0" max="29" value="9" id="1-cost">
    <span class="val" id="1-cost">9</span>
  </div>

  <div class="row">
    <label>2-cost</label>
    <input type="range" min="0" max="22" value="9" id="2-cost">
    <span class="val" id="2-cost">9</span>
  </div>

  <div class="row">
    <label>3-cost</label>
    <input type="range" min="0" max="18" value="9" id="3-cost">
    <span class="val" id="3-cost">9</span>
  </div>

  <div class="row">
    <label>4-cost</label>
    <input type="range" min="0" max="10" value="3" id="4-cost">
    <span class="val" id="4-cost">3</span>
  </div>

  <div class="row">
    <label>5-cost</label>
    <input type="range" min="0" max="9" value="1" id="5-cost">
    <span class="val" id="5-cost">1</span>
  </div>

  

  <div class="result">Distance: <span id="Prob to hit">1</span></div>

  <script>
    const numof1cost = 14;
    const numof2cost = 13;
    const numof3cost = 13;
    const numof4cost = 14;
    const numof5cost = 9;

    const lvl1pool = 29*numof1cost;
    const lvl2pool = 22*numof2cost;
    const lvl3pool = 18*numof3cost;
    const lvl4pool = 10*numof4cost;
    const lvl5pool = 9*numof5cost;

    function factorial(n) {
      let result = 1;
      for (let i = 2; i <= n; i++) {
        result *= i;
      }
      return result;
    }

    function combination(n, k) {
      if (k < 0 || k > n) return 0;
      if (k === 0 || k === n) return 1;
      let result = factorial(n)/(factorial(k)*factorial(n-k));
      return Math.round(result);
    }

    // Exact probability: P(X = k)
    function hypergeometricPMF(N, K, n, k) {
      return (combination(K, k) * combination(N - K, n - k)) / combination(N, n);
    }

    // Cumulative probability: P(X <= k)
    function hypergeometricCDF(N, K, n, k) {
      let total = 0;
      for (let i = 0; i <= k; i++) {
        total += hypergeometricPMF(N, K, n, i);
      }
      return total;
    }

    // P(X >= k)  — at least k successes
    function hypergeometricAtLeast(N, K, n, k) {
      return 1 - hypergeometricCDF(N, K, n, k - 1);
    }

    function hypergeometricEV(N,K,n) {
      return n*K/N;
    }

    function update() {
      const numofUnits1c = +document.getElementById('1-cost').value;
      const numofUnits2c = +document.getElementById('2-cost').value;
      const numofUnits3c = +document.getElementById('3-cost').value;
      const numofUnits4c = +document.getElementById('4-cost').value;
      const numofUnits5c = +document.getElementById('5-cost').value;
      document.getElementById('1-cost').textContent = numofUnits1c;
      document.getElementById('2-cost').textContent = numofUnits2c;
      document.getElementById('3-cost').textContent = numofUnits3c;
      document.getElementById('4-cost').textContent = numofUnits4c;
      document.getElementById('5-cost').textContent = numofUnits5c;
      document.getElementById('Prob to hit').textContent = hypergeometricAtLeast(lvl1pool,3,10,1);
    }

    document.getElementById('level').addEventListener('input', update);
    document.getElementById('1-cost').addEventListener('input', update);
    document.getElementById('2-cost').addEventListener('input', update);
    document.getElementById('3-cost').addEventListener('input', update);
    document.getElementById('4-cost').addEventListener('input', update);
    document.getElementById('5-cost').addEventListener('input', update);
    update();
  </script>
</body>
</html>
